[lint]
select = [
    "E",  # pycodestyle errors
    "F",  # pyflakes
    "W",  # pycodestyle warnings
    "I",  # isort
]
ignore = [
    "E501",  # line too long
    "E722",  # do not use bare 'except'
    "E402",  # module level import not at top of file
]

[format]
quote-style = "double"
indent-style = "space"
